<!DOCTYPE html>
<html>
<head>
<title>Yireh Admin Dashboard</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
table{width:100%;background:white;border-collapse:collapse;}
th,td{padding:10px;border:1px solid #ccc;}
button{padding:6px 10px;margin:3px;}
</style>
</head>
<body>

<h2>Admin Dashboard - Applications</h2>
<table id="appTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Job</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const token = localStorage.getItem("adminToken");

async function loadApps(){
  const res = await fetch("http://localhost:5000/api/admin/applications",{
    headers:{ Authorization:token }
  });
  const data = await res.json();

  const tbody = document.querySelector("#appTable tbody");
  tbody.innerHTML="";

  data.forEach(app=>{
    tbody.innerHTML+=`
    <tr>
      <td>${app.fullName}</td>
      <td>${app.email}</td>
      <td>${app.jobId?.title || ''}</td>
      <td>${new Date(app.appliedAt).toLocaleDateString()}</td>
      <td>
        <button onclick="downloadCV('${app._id}')">Download CV</button>
        <button onclick="deleteApp('${app._id}')">Delete</button>
      </td>
    </tr>`;
  });
}

function downloadCV(id){
  window.open(`http://localhost:5000/api/admin/download/${id}?token=${token}`);
}

async function deleteApp(id){
  await fetch(`http://localhost:5000/api/admin/application/${id}`,{
    method:"DELETE",
    headers:{ Authorization:token }
  });
  loadApps();
}

loadApps();
</script>

</body>
</html>
