<h2>Admin Dashboard</h2>

<div id="apps"></div>

<script>
const API = "https://yireh-backend-1.onrender.com";
const token = localStorage.getItem("adminToken");

async function load(){
  const res = await fetch(API+"/api/admin/applications",{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  document.getElementById("apps").innerHTML = data.map(a=>`
    <div style="border:1px solid #ccc;margin:10px;padding:10px;">
      <h3>${a.fullName}</h3>
      <p>${a.email}</p>
      <p>Status: ${a.status}</p>

      <button onclick="update('${a._id}','Accepted')">Accept</button>
      <button onclick="update('${a._id}','Rejected')">Reject</button>

      <a href="${API}/api/admin/download/${a._id}" target="_blank">
        Download CV
      </a>
    </div>
  `).join("");
}

async function update(id,status){
  await fetch(API+"/api/admin/application/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({status})
  });

  load();
}

load();
</script>
