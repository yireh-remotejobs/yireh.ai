<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YIREH CV BUILDER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>.logo img{
  height:55px;
  width:auto;
  display:block;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#1e3c72,#2a5298,#6dd5fa);
  color:#333;

/* ===== NAVBAR ===== */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  color:#fff;
}

.heading{
  font-size:35px;
  font-weight:700;
}

.nav-links a{
  color:#fff;
  margin:0 10px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.nav-links a:hover{
  color:#ffd700;
}

.support-buttons button{
  margin-left:10px;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.paypal{
  background:#ffc439;
}

.gpay{
  background:#000;
  color:#fff;
}
.preview{
width:50%;
background:#f4f4f4;
padding:20px;
border-radius:10px;
overflow:auto;
height:50vh;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
font-style:italic;
color:#ffffff;   /* White text */
font-weight:600;
}
}

.section{
border:1px solid #ddd;
margin-bottom:10px;
border-radius:8px;
}

.section-header{
background:#2a5298;
color:#fff;
padding:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.section-content{
padding:10px;
display:none;
}

textarea, input{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:5px;
border:1px solid #ccc;
}

.toggle-btn{
background:#ffd700;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:15px;
}

.photo-upload{
text-align:center;
margin-bottom:15px;
}

.photo-upload img{
width:120px;
height:120px;
object-fit:cover;
border-radius:50%;
cursor:move;
}

.template-selector{
margin-bottom:15px;
}

button{
padding:8px 15px;
margin:5px 0;
border:none;
border-radius:20px;
cursor:pointer;
}

.download-btn{
background:#2a5298;
color:#fff;
}

.save-btn{
background:#28a745;
color:#fff;
}

.share-btn{
background:#d4af37;
}

.preview-area{
background:#fff;
padding:20px;
min-height:100%;
}

.classic {color:#000;}
.modern {border-left:20px solid #2a5298;}
.creative {background:linear-gradient(135deg,#6dd5fa,#ffffff);}
.executive {border-top:10px solid #d4af37;}

@media(max-width:900px){
.container{flex-direction:column;}
.builder,.preview{width:100%;height:auto;}
}
</style>
</head>

<body>

<!-- COMMON HEADER -->
<div class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="logo.png" alt="Yireh Careers Logo">
    </a>
  </div>

  <div class="heading">YIREH CAREERS</div>

  <div class="nav-links">
    <a href="cv-builder.html">CV Builder</a>
    <a href="jobs.html">Jobs</a>
    <a href="internships.html">Internships</a>
    <a href="#">Scam Alerts</a>
    <a href="mailto:yireh.remotejobs@gmail.com">Contact</a>
  </div>

  <div class="support-buttons">
    <button class="paypal">PayPal</button>
    <button class="gpay">Google Pay</button>
  </div>
</div>
  </a>

<h1>YIREH CV BUILDER</h1>
<div class="subtitle">"Design Your Future Professionally"</div>

<div class="container">

<div class="builder">

<div class="photo-upload">
<input type="file" id="photoInput">
<br>
<img id="photoPreview" src="" style="display:none;">
</div>

<div class="template-selector">
<select id="templateSelect">
<option value="classic">Classic Professional</option>
<option value="modern">Modern Blue</option>
<option value="creative">Creative Gradient</option>
<option value="executive">Executive Gold</option>
</select>
</div>

<div id="sections">

<script>
const sectionNames=[
"Full Name","Professional Title","Phone","Email","Location","LinkedIn",
"Professional Summary","Technical Skills","Soft Skills",
"Work Experience","Projects","Education",
"Certifications","Languages","Additional Info"
];

document.write(sectionNames.map(name=>`
<div class="section">
<div class="section-header">
<span>${name}</span>
<button class="toggle-btn">Show</button>
</div>
<div class="section-content">
<textarea maxlength="6000" placeholder="Enter ${name}..."></textarea>
</div>
</div>
`).join(""));
</script>

</div>

<button class="download-btn" onclick="downloadPDF()">Download High Quality PDF</button>
<button class="save-btn">Save to Dashboard</button>
<button class="share-btn">Share CV Link</button>

</div>

<div class="preview">
<div id="previewArea" class="preview-area classic"></div>
</div>

</div>

<script>
const sections=document.querySelectorAll(".section");

sections.forEach(section=>{
const header=section.querySelector(".section-header");
const content=section.querySelector(".section-content");
const btn=section.querySelector(".toggle-btn");

header.addEventListener("click",()=>{
content.style.display=content.style.display==="block"?"none":"block";
btn.textContent=content.style.display==="block"?"Hide":"Show";
});
});

new Sortable(document.getElementById("sections"),{animation:150});

document.addEventListener("input",updatePreview);

function updatePreview(){
    let fullName = "";
    let title = "";
    let phone = "";
    let email = "";
    let dob = "";
    let otherSections = "";

    sections.forEach(section=>{
        const sectionTitle = section.querySelector(".section-header span").innerText;
        const text = section.querySelector("textarea").value.trim();

        if(sectionTitle === "Full Name") fullName = text;
        else if(sectionTitle === "Professional Title") title = text;
        else if(sectionTitle === "Phone") phone = text;
        else if(sectionTitle === "Email") email = text;
        else if(sectionTitle === "D.O.B") dob = text;
        else if(text !== ""){
            otherSections += `
                <div style="margin-bottom:15px;">
                    <h3 style="margin-bottom:5px;">${sectionTitle}</h3>
                    <p style="white-space:pre-wrap;">${text}</p>
                </div>
            `;
        }
    });

    let html = "";

    /* Photo */
    if(uploadedPhoto){
        html += `<img src="${uploadedPhoto}" class="cv-photo">`;
    }

    /* Name & Title (Centered, no labels) */
    if(fullName){
        html += `<div class="cv-name">${fullName}</div>`;
    }

    if(title){
        html += `<div class="cv-title">${title}</div>`;
    }

    /* Contact Row */
    if(phone || email || dob){
        html += `
        <div class="contact-row">
            ${phone ? `<div class="contact-item">📞 ${phone}</div>` : ""}
            ${email ? `<div class="contact-item">✉ ${email}</div>` : ""}
            ${dob ? `<div class="contact-item">🎂 ${dob}</div>` : ""}
        </div>
        `;
    }

    html += otherSections;

    document.getElementById("previewArea").innerHTML = html;
}

let uploadedPhoto = "";

document.getElementById("photoInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
        uploadedPhoto = reader.result;
        document.getElementById("photoPreview").src = uploadedPhoto;
        document.getElementById("photoPreview").style.display = "block";
        updatePreview();
    };
    reader.readAsDataURL(e.target.files[0]);
});

async function downloadPDF(){
    const { jsPDF } = window.jspdf;

    const element = document.getElementById("previewArea");

    const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true
    });

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","pt","a4");

    const imgWidth = 595; 
    const pageHeight = 842;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    pdf.addImage(imgData,"PNG",0,0,imgWidth,imgHeight);

    pdf.save("Yireh_CV.pdf");
}
</script>

</body>
</html>
