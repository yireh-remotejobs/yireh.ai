<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YIREH CAREERS | Jobs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f7fa;}

/* HEADER */
.navbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 40px;background:#111;color:#fff;
}
.logo{font-size:22px;font-weight:700;}
.nav-links a{
  color:#fff;margin:0 12px;text-decoration:none;
}
.nav-links a:hover{color:#ffd700;}

/* HERO */
.hero{
  padding:60px;text-align:center;color:#fff;
  background:linear-gradient(135deg,#1e3c72,#2a5298,#6dd5fa);
}
.search-bar input{
  margin-top:15px;
  padding:10px;width:260px;border:none;border-radius:6px;
}

/* LAYOUT */
.container{display:flex;gap:20px;padding:30px;flex-wrap:wrap;}
.jobs-wrapper{flex:1;}

/* JOB CARD */
.job-card{
  background:#fff;padding:20px;margin-bottom:15px;
  border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.job-card img{
  width:60px;height:60px;border-radius:6px;margin-bottom:10px;
}
.apply-btn{
  margin-top:10px;padding:8px 12px;
  background:#2a5298;color:#fff;border:none;cursor:pointer;
}

/* POST JOB */
.post-job-sidebar{
  width:340px;background:#fff;padding:20px;
  border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.post-job-sidebar input,
.post-job-sidebar select,
.post-job-sidebar textarea{
  width:100%;margin-bottom:10px;padding:8px;
}

/* MODAL */
.modal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);justify-content:center;align-items:center;
}
.modal-content{
  background:#fff;padding:20px;border-radius:8px;width:320px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="navbar">
  <div class="logo">JobSearch</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>
    <a href="internships.html">Internships</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Find Jobs Worldwide</h1>
  <div class="search-bar">
    <input type="text" placeholder="Search jobs...">
  </div>
</section>

<div class="container">

  <!-- JOB LIST -->
  <div class="jobs-wrapper" id="jobsWrapper"></div>

  <!-- POST JOB -->
  <div class="post-job-sidebar">
    <h2>Post a Job</h2>

    <form id="jobForm">
      <input type="text" id="company" placeholder="Company Name" required>
      <input type="email" id="email" placeholder="Contact Email" required>
      <input type="text" id="title" placeholder="Job Title" required>

      <select id="country" required></select>

      <input type="text" id="city" placeholder="City">
      <input type="text" id="salary" placeholder="Salary">

      <select id="type">
        <option value="">Job Type</option>
        <option>Full-Time</option>
        <option>Part-Time</option>
        <option>Contract</option>
        <option>Remote</option>
      </select>

      <textarea id="description" placeholder="Job Description"></textarea>

      <label>Upload Company Logo</label>
      <input type="file" id="logoUpload" accept="image/*">

      <button type="submit">Submit Job</button>
    </form>
  </div>

</div>

<!-- APPLY MODAL -->
<div class="modal" id="applyModal">
  <div class="modal-content">
    <h3>Apply for Job</h3>
    <form id="applyForm">
      <input type="text" id="applicantName" placeholder="Full Name" required>
      <input type="email" id="applicantEmail" placeholder="Email" required>
      <input type="file" id="cvUpload" required>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<script>
const API_URL = "https://yireh-backend-1.onrender.com/api";

document.addEventListener("DOMContentLoaded", () => {

  /* COUNTRIES */
  const countries = ["India","USA","UK","Canada","Australia","Germany","France","UAE","Singapore"];
  const countrySelect = document.getElementById("country");
  countries.forEach(c=>{
    const o=document.createElement("option");
    o.value=c; o.textContent=c;
    countrySelect.appendChild(o);
  });

  /* LOAD JOBS */
  async function loadJobs(){
    try{
      const res = await fetch(`${API_URL}/jobs`);
      const jobs = await res.json();

      const wrapper=document.getElementById("jobsWrapper");
      wrapper.innerHTML="";

      jobs.forEach(job=>{
        wrapper.innerHTML += `
          <div class="job-card">
            ${job.logo ? `<img src="${job.logo}">` : ""}
            <h3>${job.title}</h3>
            <p>${job.company}</p>
            <p>${job.country}</p>
            <button class="apply-btn" onclick="openApply('${job._id}')">Apply</button>
          </div>
        `;
      });
    }catch(err){
      console.error(err);
      alert("Error loading jobs");
    }
  }
  loadJobs();

  /* LOGO */
  let logoBase64="";
  document.getElementById("logoUpload").addEventListener("change", e=>{
    const reader=new FileReader();
    reader.onload=()=>logoBase64=reader.result;
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  });

  /* POST JOB */
  document.getElementById("jobForm").addEventListener("submit", async e=>{
    e.preventDefault();

    try{
      const res = await fetch(`${API_URL}/jobs`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          company: company.value,
          email: email.value,
          title: title.value,
          country: country.value,
          city: city.value,
          salary: salary.value,
          type: type.value,
          description: description.value,
          logo: logoBase64
        })
      });

      await res.json();
      alert("Job posted successfully");

      e.target.reset();
      logoBase64="";
      loadJobs();

    }catch(err){
      console.error(err);
      alert("Job post failed");
    }
  });

  /* APPLY */
  let selectedJobId=null;

  window.openApply = function(id){
    selectedJobId=id;
    document.getElementById("applyModal").style.display="flex";
  };

  document.getElementById("applyForm").addEventListener("submit", async e=>{
    e.preventDefault();

    try{
      const formData=new FormData();
      formData.append("jobId",selectedJobId);
      formData.append("name",applicantName.value);
      formData.append("email",applicantEmail.value);
      formData.append("cv",cvUpload.files[0]);

      await fetch(`${API_URL}/apply`,{
        method:"POST",
        body:formData
      });

      alert("Application submitted");
      document.getElementById("applyModal").style.display="none";
      e.target.reset();

    }catch(err){
      console.error(err);
      alert("Apply failed");
    }
  });

});
</script>

</body>
</html>
